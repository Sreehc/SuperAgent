name: rag-eval

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  rag-eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: superagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d superagent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start MinIO
        run: |
          docker run -d --name rag-eval-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-10-13T13-34-11Z \
            server /data --console-address ":9001"

      - name: Wait for services
        run: |
          until pg_isready -h localhost -U postgres -d superagent_test; do sleep 2; done
          until curl -fsS http://localhost:9000/minio/health/live >/dev/null; do sleep 2; done

      - name: Run rag-eval
        env:
          TEST_POSTGRES_URL: jdbc:postgresql://localhost:5432/superagent_test
          TEST_POSTGRES_USER: postgres
          TEST_POSTGRES_PASSWORD: root
          POSTGRES_URL: jdbc:postgresql://localhost:5432/superagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: superagent-documents
          MINIO_AUTO_CREATE_BUCKET: 'true'
        run: python3 scripts/rag_eval.py

      - name: Upload rag-eval summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-summary
          path: artifacts/rag-eval-summary.json
