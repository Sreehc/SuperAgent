spring:
  application:
    name: superagent-backend
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/superagent}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  jackson:
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:superagent-document-worker}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.superagent.knowledge.messaging
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

super-agent:
  app:
    name: ${spring.application.name}
    api-base-path: /api/v1
  storage:
    minio-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    minio-access-key: ${MINIO_ACCESS_KEY:minioadmin}
    minio-secret-key: ${MINIO_SECRET_KEY:minioadmin}
    minio-bucket: ${MINIO_BUCKET:superagent-documents}
    minio-auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
    upload-max-file-size-bytes: ${UPLOAD_MAX_FILE_SIZE_BYTES:52428800}
    upload-allowed-extensions:
      - pdf
      - doc
      - docx
      - ppt
      - pptx
      - md
      - html
      - txt
    upload-allowed-content-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - application/x-tika-msoffice
      - text/markdown
      - text/x-web-markdown
      - text/html
      - text/plain
      - application/xhtml+xml
      - application/xml
      - text/xml
  messaging:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    document-task-topic: ${DOCUMENT_TASK_TOPIC:superagent.document.task}
    kafka-enabled: ${KAFKA_ENABLED:false}
    inline-processing-when-kafka-disabled: ${INLINE_DOCUMENT_PROCESSING_WHEN_KAFKA_DISABLED:false}
  ai:
    openai-compatible-base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.example.com/v1}
    api-key: ${OPENAI_COMPATIBLE_API_KEY:local-dev-openai-key}
    chat-model: ${CHAT_MODEL:gpt-4.1-mini}
    chat-provider: ${CHAT_PROVIDER:local-fake}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
    embedding-provider: ${EMBEDDING_PROVIDER:openai-compatible}
    embedding-dimension: ${EMBEDDING_DIMENSION:1536}
    embedding-max-attempts: ${EMBEDDING_MAX_ATTEMPTS:3}
    embedding-retry-backoff-millis: ${EMBEDDING_RETRY_BACKOFF_MILLIS:200}
    rerank-enabled: ${RERANK_ENABLED:false}
    rerank-provider: ${RERANK_PROVIDER:disabled}
  redis:
    url: ${REDIS_URL:redis://localhost:6379}
    enabled: ${REDIS_ENABLED:true}
    conversation-lock-ttl-seconds: ${CONVERSATION_LOCK_TTL_SECONDS:300}
    stop-signal-ttl-seconds: ${CONVERSATION_STOP_SIGNAL_TTL_SECONDS:300}
  security:
    jwt-secret: ${JWT_SECRET:replace-with-local-dev-secret-1234567890}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:7200}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:1209600}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:superagent.refreshToken}
    refresh-cookie-path: ${REFRESH_COOKIE_PATH:/api/v1/auth}
    refresh-cookie-domain: ${REFRESH_COOKIE_DOMAIN:}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
  web:
    allowed-origins:
      - ${FRONTEND_ORIGIN_PRIMARY:http://localhost:5173}
      - ${FRONTEND_ORIGIN_SECONDARY:http://127.0.0.1:5173}
      - ${FRONTEND_ORIGIN_TERTIARY:http://localhost:4173}
      - ${FRONTEND_ORIGIN_QUATERNARY:http://127.0.0.1:4173}
  document-processing:
    chunk-size: ${DOCUMENT_CHUNK_SIZE:1000}
    chunk-overlap: ${DOCUMENT_CHUNK_OVERLAP:120}
    max-chunk-count: ${DOCUMENT_MAX_CHUNK_COUNT:5000}
  rag:
    query-understanding-enabled: ${RAG_QUERY_UNDERSTANDING_ENABLED:true}
    decomposition-enabled: ${RAG_DECOMPOSITION_ENABLED:true}
    rewrite-enabled: ${RAG_REWRITE_ENABLED:true}
    sub-question-enabled: ${RAG_SUB_QUESTION_ENABLED:true}
    version-consistency-enabled: ${RAG_VERSION_CONSISTENCY_ENABLED:true}
    neighbor-expansion-enabled: ${RAG_NEIGHBOR_EXPANSION_ENABLED:true}
    vector-top-k: ${RAG_VECTOR_TOP_K:20}
    keyword-top-k: ${RAG_KEYWORD_TOP_K:20}
    candidate-top-k: ${RAG_CANDIDATE_TOP_K:24}
    rrf-k: ${RAG_RRF_K:60}
    neighbor-window: ${RAG_NEIGHBOR_WINDOW:1}
    max-chunks-per-document: ${RAG_MAX_CHUNKS_PER_DOCUMENT:3}
    evidence-limit: ${RAG_EVIDENCE_LIMIT:8}
    per-question-evidence-char-limit: ${RAG_PER_QUESTION_EVIDENCE_CHAR_LIMIT:4000}
    total-evidence-char-limit: ${RAG_TOTAL_EVIDENCE_CHAR_LIMIT:12000}
    min-relevance-score: ${RAG_MIN_RELEVANCE_SCORE:0.35}
    answer-confidence-threshold: ${RAG_ANSWER_CONFIDENCE_THRESHOLD:0.55}
    no-evidence-min-results: ${RAG_NO_EVIDENCE_MIN_RESULTS:1}
    force-citation-enabled: ${RAG_FORCE_CITATION_ENABLED:true}
    max-sub-questions: ${RAG_MAX_SUB_QUESTIONS:4}
    query-result-cache-enabled: ${RAG_QUERY_RESULT_CACHE_ENABLED:false}
    query-result-cache-ttl-seconds: ${RAG_QUERY_RESULT_CACHE_TTL_SECONDS:30}
  agent:
    service-base-url: ${AGENT_SERVICE_BASE_URL:http://localhost:18081}
    enabled-default: ${AGENT_ENABLED_DEFAULT:false}
    max-model-steps: ${AGENT_MAX_MODEL_STEPS:8}
    max-tool-calls: ${AGENT_MAX_TOOL_CALLS:10}
    checkpoint-enabled: ${AGENT_CHECKPOINT_ENABLED:true}
    code-execution-enabled: ${CODE_EXECUTION_ENABLED:false}
  tools:
    web-search-enabled: ${WEB_SEARCH_ENABLED:false}
    http-tool-enabled: ${HTTP_TOOL_ENABLED:false}
    graph-tool-enabled: ${GRAPH_TOOL_ENABLED:false}
    code-execution-enabled: ${CODE_EXECUTION_ENABLED:false}
    tool-timeout-ms: ${TOOL_TIMEOUT_MS:10000}
    search-provider: ${SEARCH_PROVIDER:tavily}
    allowed-http-domains: ${ALLOWED_HTTP_DOMAINS:}
  graph:
    neo4j-uri: ${NEO4J_URI:bolt://localhost:7687}
    neo4j-username: ${NEO4J_USERNAME:neo4j}
    neo4j-password: ${NEO4J_PASSWORD:password}
    enabled: ${GRAPH_ENABLED:false}
