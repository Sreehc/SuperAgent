spring:
  datasource:
    url: ${TEST_POSTGRES_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/superagent_test}}
    username: ${TEST_POSTGRES_USER:${POSTGRES_USER:postgres}}
    password: ${TEST_POSTGRES_PASSWORD:${POSTGRES_PASSWORD:root}}
  kafka:
    consumer:
      auto-offset-reset: earliest

super-agent:
  redis:
    enabled: false
  messaging:
    kafka-enabled: ${TEST_KAFKA_ENABLED:false}
